	(function loadReport() {
		const reports = JSON.parse(localStorage.getItem('visitor_reports') || '[]');
		currentReport = reports.find(r => r.id === reportId);
		
		if (!currentReport) {
			document.getElementById('report-output').innerHTML = '<p style="text-align:center; color:#888;">Report not found.</p>';
			return;
		}
		
		// Convert markdown to HTML (simple conversion)
		const markdownContent = currentReport.content;
		const htmlContent = convertMarkdownToHTML(markdownContent);
		document.getElementById('report-output').innerHTML = htmlContent;
		
		// Set timestamp
		const date = new Date(currentReport.created_at);
		const timestampEl = document.getElementById('report-timestamp');
		timestampEl.textContent = date.toLocaleDateString('en-US', {month:'short', day:'2-digit', year:'numeric'}) 
			+ ' — ' + date.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
	})();
	
	// Simple markdown to HTML converter
	function convertMarkdownToHTML(markdown) {
		let html = markdown;
		
		// Headers
		html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
		html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
		html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
		
		// Bold
		html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
		
		// Lists
		html = html.replace(/^\* (.*$)/gim, '<li>$1</li>');
		html = html.replace(/^- (.*$)/gim, '<li>$1</li>');
		
		// Wrap consecutive <li> in <ul>
		html = html.replace(/(<li>.*<\/li>(\n|$))+/g, function(match) {
			return '<ul>' + match + '</ul>';
		});
		
		// Paragraphs
		html = html.split('\n\n').map(para => {
			if (!para.startsWith('<') && para.trim() !== '') {
				return '<p>' + para + '</p>';
			}
			return para;
		}).join('\n');
		
		return html;
	}

	// Visitor report management
	function updateVisitorReportCount() {
		const reports = JSON.parse(localStorage.getItem('visitor_reports') || '[]');
		const countElement = document.getElementById('visitor-report-count');
		if (countElement) {
			countElement.textContent = reports.length;
		}
	}

	function showVisitorReports(e) {
		e.preventDefault();
		const reports = JSON.parse(localStorage.getItem('visitor_reports') || '[]');
		const listElement = document.getElementById('visitor-reports-list');
		
		if (reports.length === 0) {
			listElement.innerHTML = '<p style="text-align:center; color:#888;">No saved reports yet. Generate a report to get started.</p>';
		} else {
			let html = '<div class="sources-container-reports">';
			reports.forEach(function(report) {
				const date = new Date(report.created_at);
				const dateStr = date.toLocaleDateString('en-US', {month:'2-digit', day:'2-digit', year:'2-digit'}) 
					+ ' — ' + date.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
				
				html += `
					<div class="source-chip-index">
						<a href="/visitor_report?load=${report.id}" class="chip-row-link">
							<span class="chip-type-fullbrief-index">Full Briefing</span>
							<span class="date-style-index">${dateStr}</span>
						</a>
						<button onclick="deleteVisitorReport('${report.id}')" class="x-delete">×</button>
					</div>
				`;
			});
			html += '</div>';
			listElement.innerHTML = html;
		}
		
		document.getElementById('visitor-reports-modal').style.display = 'block';
	}

	function closeVisitorReports() {
		document.getElementById('visitor-reports-modal').style.display = 'none';
	}

	function deleteVisitorReport(reportId) {
		let reports = JSON.parse(localStorage.getItem('visitor_reports') || '[]');
		reports = reports.filter(r => r.id !== reportId);
		localStorage.setItem('visitor_reports', JSON.stringify(reports));
		updateVisitorReportCount();
		
		// If we deleted the current report, redirect home
		if (reportId === '{{ report_id }}') {
			window.location.href = '/';
		} else {
			showVisitorReports(new Event('click'));
		}
	}

	updateVisitorReportCount();
